<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Retrieval System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Video Retrieval</h2>

        <div class="menu-group">
            <label>Search</label>
            <input type="text" id="query" placeholder="Enter query...">
        </div>

        <div class="menu-group">
            <label>Video ID (for in-video search)</label>
            <input type="text" id="videoId" placeholder="e.g. video_01">
        </div>

        <div class="menu-group">
            <label>Top K</label>
            <select id="topk">
                <option value="54">54</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="menu-group">
            <label>Search Mode</label>
            <select id="searchMode">
               <option value="clip">CLIP Search (L14)</option>
               <option value="viclip">ViCLIP Search</option>
               <option value="clip_in_video">CLIP Search in one Video</option>
               <option value="ocr">OCR Search</option>
               <option value="audio">Audio Search</option>
            </select>
        </div>

        <button onclick="search()">🔍 Search</button>

    </div>

    <!-- Main -->
    <div class="main">

        <h1>Video Retrieval System</h1>

        <video id="videoPlayer" controls style="width:100%; margin-bottom:10px;"></video>

        <button id="backBtn" onclick="backToSearch()" style="display:none; margin-bottom:10px;">
            ⬅ Back to Clip Search
        </button>

        <div class="pagination">
            <button onclick="changePage(-1)">⬅ Prev</button>
            <span id="pageInfo">Page 1</span>
            <button onclick="changePage(1)">Next ➡</button>
        </div>

        <div id="results" class="gallery"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
